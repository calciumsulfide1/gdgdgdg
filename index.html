<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Академия Резистенс</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --container-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-color: #ff3c3c;
            --border-color: #333;
        }

        body {
            font-family: 'Verdana', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 100%;
            max-width: 650px;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 15px rgba(255, 60, 60, 0.1);
        }

        h1 {
            color: var(--accent-color);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.3rem;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        #text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            min-height: 100px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            background: #252525;
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: 0.3s;
        }

        button:hover {
            border-color: var(--accent-color);
            background: #333;
            transform: translateX(5px);
        }

        .wasted { color: #ff3c3c; font-weight: bold; font-size: 1.8rem; text-align: center; text-transform: uppercase; }
        .ending { color: #00ffaa; font-weight: bold; font-size: 1.3rem; border: 2px dashed #00ffaa; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Академия Резистенс</h1>
    <div id="text">Загрузка...</div>
    <div id="option-buttons" class="buttons"></div>
</div>

<script>
    const textElement = document.getElementById('text');
    const optionButtonsElement = document.getElementById('option-buttons');

    const textNodes = [
        {
            id: 1,
            text: 'Ты стоишь у входа в комнату Сабрины. На тебя несется Дин Винчестер. Твои действия?',
            options: [
                { text: '«отпизжу его!»', next: 2 },
                { text: '«убегу»', next: 3 },
                { text: '«останусь стоять на месте»', next: 4 }
            ]
        },
        {
            id: 2,
            text: 'ты не Картер. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ ЕЩЕ РАЗ', next: 1 }]
        },
        {
            id: 3,
            text: 'Ты успешно избежала столкновение с Дином! Ты слышишь, как трещит деревянная дверь. Кажется, Сабрине не поздоровится… Вдруг из-за угла вылетает явно ошарашенная Марселин. Увидев тебя, она приняла обычный сучий вид. «Ты новенькая? Нищета,» — говорит она. Что ты ответишь?',
            options: [
                { text: '«твоя мама мертвая шлюха»', next: 5 },
                { text: '«да, новенькая! меня зовут аделина, приятно познакомиться!»', next: 6 },
                { text: '«я не из нищеебов, ты что-то путаешь»', next: 7 }
            ]
        },
        {
            id: 4,
            text: 'Дин выбил тебе мозги вместе с дверью в комнату Сабрины. Тебе никогда не стать Скарлетт Йохансон. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ СНОВА', next: 1 }]
        },
        {
            id: 5,
            text: 'Марселин взорвалась. Ты вышла на секретную концовку. Тебя мгновенно усыпили, а проснулась ты в комнате, полной соленых огурцов, зеленых оливок, креветок и морковки по-корейски. На огромном экране шел Ла-Ла Ленд. А после него начался настоящий пятый сезон Очень Странных дел, в котором Робин и Нэнси стали каноном.',
            isEnding: true,
            options: [{ text: 'ЭТО РАЙ (ИГРАТЬ СНОВА)', next: 1 }]
        },
        {
            id: 6,
            text: 'Марселин смерила тебя высокомерным взглядом. Она хмыкнула и, махнув волосами, ушла, так ничего и не ответив. Куда ты пойдешь дальше?',
            options: [
                { text: 'сад', next: 8 },
                { text: 'мусорка', next: 9 },
                { text: 'столовая', next: 10 }
            ]
        },
        {
            id: 7,
            text: '«Ок,» — отвечает Марселин. Ты поражена ее способностям вести конструктивный диалог. Вместо нее вдруг появился Тун Тун Тун Сахур. «Привет! Значит, ты наследница? Пошли за мной!» — говорит он.',
            options: [
                { text: '«нет иди на хуй»', next: 11 },
                { text: '«ну го»', next: 12 }
            ]
        },
        {
            id: 8,
            text: 'Ты пришла в сад. Там сидела девчонка с темными черными волосами и плакала. Подойдешь к ней?',
            options: [
                { text: 'да', next: 13 },
                { text: 'нет', next: 14 }
            ]
        },
        {
            id: 9,
            text: 'Ты пришла на мусорку. Атмосфера явно неприятная. Вдруг ты замечаешь торчащие из-за бака ноги и слышишь шорох. «Что ты тут забыла?» — спрашивает Эмма, выскользнув из темноты. — «Лучше беги, иначе я тебя убью, прямо как эту бедняжку.» Что ты ответишь?',
            options: [
                { text: '«я директриса вообще-то»', next: 18 },
                { text: '«марселин шлюха»', next: 19 },
                { text: '«ты шалава какая-то»', next: 20 }
            ]
        },
        {
            id: 10,
            text: 'В столовой царил хаос. Аселия, занявшая сразу три скамейки, опрокидывала рукой чужие подносы и слизывала с пола еду. Никто не мог ей ничего сказать. Все ее боялись. Ты обязана дать ей отпор! Ты подошла к ней. «Чего тебе?» — прозвучал утробный рык.',
            options: [
                { text: '«что подумает никлаус, когда увидит тебя?»', next: 15 },
                { text: '«ты пишешь посты через гпт»', next: 16 },
                { text: '«я забираю у тебя права админа. ты больше не второй админ»', next: 17 }
            ]
        },
        {
            id: 11,
            text: 'Тун Тун Тун Сахур не привык к такому обращению. Он обиделся и удалил тебя из реальности. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ СНОВА', next: 1 }]
        },
        {
            id: 12,
            text: 'Тебе было сказано, не доверяй Сахуру… Ты потеряла сознание и очнулась в темнице. Повсюду были пятна крови. На стене было написано: «Ребят, поступило много жалоб на @calcium_sulfide @teufels_anwalt @dkpsin @rageaveugle @Enotqqqq \n\nК сожалению, очень много жалоб из-за того, что люди в какой-то мере делают чат некомфортным, своей манерой общения»… Кажется, тебе пришел конец. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ СНОВА', next: 1 }]
        },
        {
            id: 13,
            text: 'Это была латентная лесбуха Эда. Ты заразилась лесбиянством. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ СНОВА', next: 1 }]
        },
        {
            id: 14,
            text: 'Ты не стала подходить к сомнительной личности. Больше в саду не было ничего интересного. Куда пойдешь дальше?',
            options: [
                { text: 'столовая', next: 10 },
                { text: 'мусорка', next: 9 }
            ]
        },
        {
            id: 15,
            text: 'Аселия разозлилась, пришлепнула тебя в котлету и съела. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ СНОВА', next: 1 }]
        },
        {
            id: 16,
            text: 'Аселия разозлилась, пришлепнула тебя в котлету и съела. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ СНОВА', next: 1 }]
        },
        {
            id: 17,
            text: 'Аселия покраснела, глаза выкатились, а после она лопнула, как шарик. От нее осталась только резина от латексного костюма, который она носила под одеждой, чтобы утянуть свои выпуклости. Все счастливы и хлопают тебе. Ты крутая девчонка! Куда пойдешь дальше?',
            options: [{ text: 'отправиться на мусорку', next: 9 }]
        },
        {
            id: 18,
            text: 'Вы занялись жестким бсдм-сексом. Счастливая концовка, но не каноничная.',
            isEnding: true,
            options: [{ text: 'ИГРАТЬ СНОВА', next: 1 }]
        },
        {
            id: 19,
            text: '«Ты права. Ну ладно, иди,» — говорит Эмма, качая головой. Но тебе больше некуда идти, ты ведь уже все обошла! Ну что, к себе в комнату?',
            options: [{ text: 'газ к себе в комнату', next: 21 }]
        },
        {
            id: 20,
            text: 'Эмма тебя убила. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ СНОВА', next: 1 }]
        },
        {
            id: 21,
            text: 'Ты пришла к себе в комнату. День вышел насыщенный. Усталость быстро тебя накрыла, и глаза сами закрылись. Ты вспомнила чат «арабы»… Кажется, там было что-то интересное в описании. Ты обязательно посмотришь, когда проснешься. \n\n КАНОНИЧНАЯ КОНЦОВКА',
            isEnding: true,
            options: [{ text: 'ПРОЙТИ ЕЩЕ РАЗ', next: 1 }]
        }
    ];

    function showNode(id) {
        const node = textNodes.find(n => n.id === id);
        textElement.innerHTML = '';
        if (node.isWasted) {
            textElement.innerHTML = `<div class="wasted">${node.text}</div>`;
        } else if (node.isEnding) {
            textElement.innerHTML = `<div class="ending">${node.text}</div>`;
        } else {
            textElement.innerText = node.text;
        }

        optionButtonsElement.innerHTML = '';
        node.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt.text;
            btn.onclick = () => showNode(opt.next);
            optionButtonsElement.appendChild(btn);
        });
    }

    showNode(1);
</script>
</body>
</html>
